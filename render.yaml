databases:
  - name: talentlens-db
    plan: free
    databaseName: talentlens
    user: talentlens

services:
  - type: web
    name: talentlens-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: talentlens-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemini-2.5-flash
      - key: CORS_ORIGINS
        value: '["https://talentlens-frontend.onrender.com"]'

  - type: web
    name: talentlens-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://talentlens-backend.onrender.com
